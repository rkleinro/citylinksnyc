<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password &mdash; CityLinks NYC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #0b0f0c;
      --bg2:    #111812;
      --bg3:    #19211a;
      --border: #2a352b;
      --green:  #8ecf72;
      --text:   #e8f0e9;
      --muted:  #7a9b7d;
      --subtle: #3d5240;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--green);
      letter-spacing: -0.02em;
      margin-bottom: 2.5rem;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p.sub {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.375rem;
    }
    input[type="password"] {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.625rem 0.875rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
    }
    input[type="password"]:focus { border-color: var(--green); }
    .btn {
      width: 100%;
      background: var(--green);
      color: #0b0f0c;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 1rem;
      font-size: 0.875rem;
      text-align: center;
      min-height: 1.25rem;
    }
    .msg.error { color: #f87171; }
    .msg.success { color: var(--green); }
    .back {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted);
    }
    .back a { color: var(--green); text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="logo"><img src="./logo.jpg" alt="CityLinks NYC" style="height:70px;width:auto;display:block;margin:0 auto;"></div>

  <div class="card" id="resetCard">
    <h1>Set new password</h1>
    <p class="sub">Enter a new password for your account.</p>

    <label for="newPass">New password</label>
    <input type="password" id="newPass" placeholder="At least 8 characters" />

    <label for="confirmPass">Confirm password</label>
    <input type="password" id="confirmPass" placeholder="Repeat your password" />

    <button class="btn" id="resetBtn" onclick="doReset()">Update password</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="card" id="successCard" style="display:none; text-align:center;">
    <div style="font-size:2rem; margin-bottom:1rem;">â</div>
    <h1>Password updated</h1>
    <p class="sub" style="margin-top:0.5rem;">You're all set. Head back to sign in.</p>
    <a href="index.html" class="btn" style="display:block; margin-top:1.5rem; text-decoration:none; text-align:center;">Back to sign in</a>
  </div>

  <div class="back">
    <a href="index.html">â Back to CityLinks</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ecdfabwgojvrkzlbknww.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjZGZhYndnb2p2cmt6bGJrbnd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTIxNjUsImV4cCI6MjA5Mjc4ODE2NX0.hSpRtYo4cv0wKM6LwJRGtxLXQMboRZjwDQRBHRdVlO0';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Supabase sends the user back here with a token in the URL hash
    // The SDK handles extracting it automatically on createClient

    async function doReset() {
      const pass    = document.getElementById('newPass').value.trim();
      const confirm = document.getElementById('confirmPass').value.trim();
      const msg     = document.getElementById('msg');
      const btn     = document.getElementById('resetBtn');

      msg.className = 'msg';
      msg.textContent = '';

      if (!pass || pass.length < 8) {
        msg.className = 'msg error';
        msg.textContent = 'Password must be at least 8 characters.';
        return;
      }
      if (pass !== confirm) {
        msg.className = 'msg error';
        msg.textContent = 'Passwords don\'t match.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating&mdash;¦';

      const { error } = await sb.auth.updateUser({ password: pass });

      if (error) {
        msg.className = 'msg error';
        msg.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Update password';
      } else {
        document.getElementById('resetCard').style.display = 'none';
        document.getElementById('successCard').style.display = 'block';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doReset();
    });
  </script>
</body>
</html>
